# TradeCore production stack — dedicated VPS (formationdouane.online)
#
# Deploy:
#   1. Copy repo to /opt/tradecore on the VPS
#   2. Create .env.production (see .env.production.example)
#   3. docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#
# TLS: Cloudflare Origin Certificate
#   Place origin.pem and origin-key.pem in ./certs/
#   Set Cloudflare SSL/TLS mode to "Full (strict)"

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tradecore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-tradecore}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tradecore}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tradecore

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tradecore

  api:
    image: ghcr.io/${GITHUB_REPOSITORY:-obamg/trading_gang}/api:${API_IMAGE_TAG:-latest}
    build:
      context: ./tradecore
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-tradecore}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tradecore}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-tradecore}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tradecore}
      REDIS_URL: redis://redis:6379/0
      RATE_LIMIT_STORAGE_URL: redis://redis:6379/1
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      FRONTEND_URL: https://formationdouane.online
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: https://formationdouane.online/api/auth/google/callback
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-no-reply@formationdouane.online}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-TradeCore}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_ENABLED: ${TELEGRAM_BOT_ENABLED:-false}
      WHALE_ALERT_API_KEY: ${WHALE_ALERT_API_KEY:-}
      COINGECKO_API_KEY: ${COINGECKO_API_KEY:-}
      TRADING_ECONOMICS_API_KEY: ${TRADING_ECONOMICS_API_KEY:-}
      BINANCE_STREAMS_ENABLED: ${BINANCE_STREAMS_ENABLED:-true}
      SCHEDULER_ENABLED: "false"
      RUN_MIGRATIONS: "1"
      RUN_SEED: "0"
    networks:
      - tradecore

  scheduler:
    image: ghcr.io/${GITHUB_REPOSITORY:-obamg/trading_gang}/api:${API_IMAGE_TAG:-latest}
    build:
      context: ./tradecore
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-tradecore}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tradecore}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-tradecore}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tradecore}
      REDIS_URL: redis://redis:6379/0
      RATE_LIMIT_STORAGE_URL: redis://redis:6379/1
      JWT_SECRET: ${JWT_SECRET}
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      FRONTEND_URL: https://formationdouane.online
      BINANCE_STREAMS_ENABLED: "false"
      SCHEDULER_ENABLED: "true"
      WHALE_ALERT_API_KEY: ${WHALE_ALERT_API_KEY:-}
      COINGECKO_API_KEY: ${COINGECKO_API_KEY:-}
      TRADING_ECONOMICS_API_KEY: ${TRADING_ECONOMICS_API_KEY:-}
      RUN_MIGRATIONS: "0"
      RUN_SEED: "0"
    command: ["python", "-m", "app.services.scheduler_standalone"]
    healthcheck:
      disable: true
    networks:
      - tradecore

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY:-obamg/trading_gang}/frontend:${FRONTEND_IMAGE_TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_WS_URL: wss://ws.formationdouane.online/ws
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - tradecore

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/prod.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/ssl/cloudflare:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    networks:
      - tradecore

volumes:
  pg_data:
  redis_data:
  letsencrypt:
  certbot_www:

networks:
  tradecore:
    driver: bridge
