worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout 65;
    server_tokens off;

    # Logging to stdout/stderr so docker picks it up
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # Rate limiting zones — key on client IP
    limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=100r/m;

    # Gzip all the text-y things
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml;

    # Backend upstream — container name in docker-compose network
    upstream tradecore_api {
        server api:8000;
        keepalive 32;
    }

    server {
        listen       80 default_server;
        server_name  _;

        root   /usr/share/nginx/html;
        index  index.html;

        # Security headers (layered with app-level headers)
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ----- WebSocket proxy -----
        location /ws {
            proxy_pass http://tradecore_api/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ----- Auth endpoints — stricter rate limit -----
        # strip /api prefix here too — backend mounts /auth/* directly
        location ~ ^/api/auth/(.*)$ {
            limit_req zone=auth_zone burst=20 nodelay;

            proxy_pass http://tradecore_api/auth/$1$is_args$args;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ----- Everything else on /api -----
        location /api/ {
            # strip /api prefix — backend routes live at /auth, /radarx, etc.
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://tradecore_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ----- Static SPA -----
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache hashed assets aggressively
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }
    }
}
