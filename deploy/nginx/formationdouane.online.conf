# TradeCore public vhost, served by the host-level `toxal-nginx` container.
# ---------------------------------------------------------------------------
# This file is NOT auto-synced — copy it to the VPS once, then reload nginx:
#
#   scp deploy/nginx/formationdouane.online.conf \
#       deploy@<VPS>:/opt/toxal/nginx/conf.d/formationdouane.online.conf
#   docker exec toxal-nginx nginx -t && docker exec toxal-nginx nginx -s reload
#
# REPLACE __GATEWAY_IP__ with the output of:
#   docker network inspect toxal_toxal --format '{{(index .IPAM.Config 0).Gateway}}'
#
# First-time bootstrap (HTTPS block fails to load before the cert exists):
#   1. Temporarily comment out the entire `server { listen 443 ... }` block.
#   2. Copy + reload nginx with only the port 80 block.
#   3. Issue the cert via the existing certbot container:
#        cd /opt/toxal
#        docker compose run --rm certbot certonly \
#          --webroot -w /var/www/certbot \
#          -d formationdouane.online \
#          -d www.formationdouane.online \
#          -d app.formationdouane.online \
#          --email YOUR_EMAIL@example.com --agree-tos --no-eff-email
#   4. Uncomment the HTTPS block, reload nginx again.
# ---------------------------------------------------------------------------

# HTTP -> HTTPS + ACME challenge webroot
server {
    listen 80;
    listen [::]:80;
    server_name formationdouane.online www.formationdouane.online app.formationdouane.online;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS -> TradeCore frontend (loopback-bound on host port 8090)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name formationdouane.online www.formationdouane.online app.formationdouane.online;

    ssl_certificate     /etc/letsencrypt/live/formationdouane.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/formationdouane.online/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;

    client_max_body_size 20m;

    location / {
        # __GATEWAY_IP__ = gateway of the toxal_toxal bridge as seen from the
        # toxal-nginx container. Stable across container restarts.
        proxy_pass http://__GATEWAY_IP__:8090;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade for any /ws/* routes
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }
}
