# Temporary HTTP-only config — used before TLS cert is issued.
# The deploy script swaps this for prod.conf after certbot runs.
worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    server_tokens off;
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    server {
        listen 80;
        listen [::]:80;
        server_name formationdouane.online www.formationdouane.online;

        # ACME challenge for certbot
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Serve a simple status page during bootstrap
        location /health {
            return 200 'TradeCore bootstrap OK\n';
            add_header Content-Type text/plain;
        }

        location / {
            return 200 'TradeCore is setting up TLS. Try again in a minute.\n';
            add_header Content-Type text/plain;
        }
    }
}
