worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout 65;
    server_tokens off;

    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=100r/m;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json application/xml
        image/svg+xml;

    # Docker DNS resolver — re-resolves upstream names on every request
    # so container IP changes after redeploy are picked up automatically.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── HTTP → HTTPS redirect ──
    server {
        listen 80;
        listen [::]:80;
        server_name formationdouane.online www.formationdouane.online;

        location / {
            return 301 https://formationdouane.online$request_uri;
        }
    }

    # ── ACME + redirect for ws subdomain ──
    server {
        listen 80;
        listen [::]:80;
        server_name ws.formationdouane.online;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            return 301 https://ws.formationdouane.online$request_uri;
        }
    }

    # ── www → apex redirect ──
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name www.formationdouane.online;

        ssl_certificate     /etc/ssl/cloudflare/origin.pem;
        ssl_certificate_key /etc/ssl/cloudflare/origin-key.pem;

        return 301 https://formationdouane.online$request_uri;
    }

    # ── Main HTTPS server ──
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name formationdouane.online;

        ssl_certificate     /etc/ssl/cloudflare/origin.pem;
        ssl_certificate_key /etc/ssl/cloudflare/origin-key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "DENY" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

        client_max_body_size 20m;

        # ── WebSocket ──
        location /ws {
            set $api_upstream http://api:8000;
            proxy_pass $api_upstream/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
        }

        # ── Auth endpoints (stricter rate limit) ──
        location ~ ^/api/auth/(.*)$ {
            set $api_upstream http://api:8000;
            limit_req zone=auth_zone burst=20 nodelay;
            proxy_pass $api_upstream/auth/$1$is_args$args;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── API (strip /api prefix) ──
        location /api/ {
            set $api_upstream http://api:8000;
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass $api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Hashed static assets (1 year cache) ──
        location /assets/ {
            set $frontend_upstream http://frontend:80;
            proxy_pass $frontend_upstream/assets/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ── Frontend SPA (fallback to index.html) ──
        location / {
            set $frontend_upstream http://frontend:80;
            proxy_pass $frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ── WebSocket subdomain (bypasses Cloudflare, uses Let's Encrypt) ──
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name ws.formationdouane.online;

        ssl_certificate     /etc/letsencrypt/live/ws.formationdouane.online/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ws.formationdouane.online/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        location /ws {
            set $api_upstream http://api:8000;
            proxy_pass $api_upstream/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
        }

        location / {
            return 404;
        }
    }
}
