name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_API: ${{ github.repository }}/api
  IMAGE_FRONTEND: ${{ github.repository }}/frontend

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: tradecore
          POSTGRES_PASSWORD: tradecore
          POSTGRES_DB: tradecore_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U tradecore"
          --health-interval=10s --health-timeout=5s --health-retries=5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: tradecore/requirements.txt

      - name: Install deps
        working-directory: tradecore
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx aiosqlite

      - name: Run tests
        working-directory: tradecore
        env:
          APP_ENV: test
          DATABASE_URL: postgresql+asyncpg://tradecore:tradecore@localhost:5432/tradecore_test
          DATABASE_URL_SYNC: postgresql+psycopg2://tradecore:tradecore@localhost:5432/tradecore_test
          REDIS_URL: redis://localhost:6379/0
          RATE_LIMIT_STORAGE_URL: redis://localhost:6379/1
          JWT_SECRET: test-jwt-secret-only-for-ci
          APP_SECRET_KEY: test-app-secret-only-for-ci
          ENCRYPTION_KEY: 8g-1hXY-2V0nD40VOCk3k-c0mHScOBWxCpL_qcfHQZE=
        run: pytest -q

  frontend-tests:
    name: Frontend tests & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Unit tests
        working-directory: frontend
        run: npm test -- --run

      - name: Production build
        working-directory: frontend
        run: npm run build

  build-and-push:
    name: Build & push images
    needs: [backend-tests, frontend-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: ./tradecore
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_API }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_API }}:${{ github.sha }}

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_URL=/api
            VITE_WS_URL=/ws
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}:${{ github.sha }}

  deploy:
    name: Deploy to production
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Trigger deploy
        run: |
          echo "Images pushed — wire this step to your deploy mechanism:"
          echo "  ssh host 'cd /opt/tradecore && docker compose pull && docker compose up -d'"
          echo "Or call a webhook / kubectl / terraform here."
