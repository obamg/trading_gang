name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_full_deploy:
        description: "Rebuild and redeploy every service, ignoring change detection"
        required: false
        default: "false"

env:
  REGISTRY: ghcr.io
  IMAGE_API: ${{ github.repository }}/api
  IMAGE_FRONTEND: ${{ github.repository }}/frontend

jobs:
  # ----------------------------------------------------------------------
  # Change detection — decides which services need a rebuild + redeploy.
  # Map of source paths to service groups:
  #   tradecore/**          → api (also rebuilds scheduler, same image)
  #   frontend/**           → frontend
  #   docker-compose.prod.yml
  #     scripts/deploy-remote.sh
  #     .github/workflows/deploy.yml  → infra: redeploy everything
  # ----------------------------------------------------------------------
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      frontend: ${{ steps.filter.outputs.frontend }}
      infra: ${{ steps.filter.outputs.infra }}
      force: ${{ github.event.inputs.force_full_deploy == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'tradecore/**'
            frontend:
              - 'frontend/**'
            infra:
              - 'docker-compose.prod.yml'
              - 'scripts/deploy-remote.sh'
              - 'deploy/nginx/**'
              - '.github/workflows/deploy.yml'

  # ----------------------------------------------------------------------
  # Tests only run when the relevant tree changed (or on manual dispatch).
  # ----------------------------------------------------------------------
  backend-tests:
    name: Backend tests
    needs: changes
    if: >-
      needs.changes.outputs.api == 'true' ||
      needs.changes.outputs.infra == 'true' ||
      needs.changes.outputs.force == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: tradecore
          POSTGRES_PASSWORD: tradecore
          POSTGRES_DB: tradecore_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U tradecore"
          --health-interval=10s --health-timeout=5s --health-retries=5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s --health-timeout=5s --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: tradecore/requirements.txt
      - name: Install deps
        working-directory: tradecore
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx aiosqlite
      - name: Run tests
        working-directory: tradecore
        env:
          APP_ENV: test
          DATABASE_URL: postgresql+asyncpg://tradecore:tradecore@localhost:5432/tradecore_test
          DATABASE_URL_SYNC: postgresql+psycopg2://tradecore:tradecore@localhost:5432/tradecore_test
          REDIS_URL: redis://localhost:6379/0
          RATE_LIMIT_STORAGE_URL: redis://localhost:6379/1
          JWT_SECRET: test-jwt-secret-only-for-ci
          APP_SECRET_KEY: test-app-secret-only-for-ci
          ENCRYPTION_KEY: 8g-1hXY-2V0nD40VOCk3k-c0mHScOBWxCpL_qcfHQZE=
        run: pytest -q

  frontend-tests:
    name: Frontend tests & build
    needs: changes
    if: >-
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.infra == 'true' ||
      needs.changes.outputs.force == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        working-directory: frontend
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund
      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck
      - name: Unit tests
        working-directory: frontend
        run: npm test -- --run
      - name: Production build
        working-directory: frontend
        run: npm run build

  # ----------------------------------------------------------------------
  # Build only the images whose source changed (or both, if infra changed).
  # Each build job is gated by its own `if:` so unchanged images don't rebuild.
  # ----------------------------------------------------------------------
  build-api:
    name: Build & push API image
    needs: [changes, backend-tests]
    if: >-
      github.event_name == 'push' && github.ref == 'refs/heads/main' &&
      (needs.changes.outputs.api == 'true' ||
       needs.changes.outputs.infra == 'true' ||
       needs.changes.outputs.force == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./tradecore
          push: true
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_API }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_API }}:${{ github.sha }}

  build-frontend:
    name: Build & push frontend image
    needs: [changes, frontend-tests]
    if: >-
      github.event_name == 'push' && github.ref == 'refs/heads/main' &&
      (needs.changes.outputs.frontend == 'true' ||
       needs.changes.outputs.infra == 'true' ||
       needs.changes.outputs.force == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
          build-args: |
            VITE_API_URL=/api
            VITE_WS_URL=/ws
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}:${{ github.sha }}

  # ----------------------------------------------------------------------
  # Deploy to Hostinger VPS — SSH in, sync the compose file, run the
  # selective deploy script. Restarts only the changed services.
  # ----------------------------------------------------------------------
  deploy:
    name: Deploy to VPS
    needs: [changes, build-api, build-frontend]
    # `always()` so this runs even if one of the build jobs was skipped
    # because nothing in its tree changed. We then filter inside: if a
    # build that *should* have run actually failed, abort.
    if: >-
      always() &&
      github.event_name == 'push' && github.ref == 'refs/heads/main' &&
      (needs.changes.outputs.api == 'true' ||
       needs.changes.outputs.frontend == 'true' ||
       needs.changes.outputs.infra == 'true' ||
       needs.changes.outputs.force == 'true') &&
      needs.build-api.result != 'failure' &&
      needs.build-frontend.result != 'failure'
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      # Never two deploys at once to the same box.
      group: hostinger-prod
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Compute deploy scope
        id: scope
        env:
          API_CHANGED: ${{ needs.changes.outputs.api }}
          FRONTEND_CHANGED: ${{ needs.changes.outputs.frontend }}
          INFRA_CHANGED: ${{ needs.changes.outputs.infra }}
          FORCE: ${{ needs.changes.outputs.force }}
        run: |
          set -eu
          services=""
          if [[ "$INFRA_CHANGED" == "true" || "$FORCE" == "true" ]]; then
            services="postgres redis api scheduler frontend nginx"
          else
            [[ "$API_CHANGED" == "true" ]] && services="$services api scheduler"
            [[ "$FRONTEND_CHANGED" == "true" ]] && services="$services frontend"
          fi
          services="$(echo "$services" | xargs)"  # trim
          echo "services=$services" >> "$GITHUB_OUTPUT"
          echo "deploying services: [$services]"

      - name: Verify required secrets are set
        env:
          HOSTINGER_SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          HOSTINGER_SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          HOSTINGER_SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
        run: |
          set -eu
          missing=""
          [[ -z "${HOSTINGER_SSH_KEY:-}" ]] && missing="$missing HOSTINGER_SSH_KEY"
          [[ -z "${HOSTINGER_SSH_HOST:-}" ]] && missing="$missing HOSTINGER_SSH_HOST"
          [[ -z "${HOSTINGER_SSH_USER:-}" ]] && missing="$missing HOSTINGER_SSH_USER"
          if [[ -n "$missing" ]]; then
            echo "Missing required secrets on the 'production' environment:$missing"
            echo "Configure at: Settings → Environments → production → Environment secrets"
            exit 1
          fi
          echo "ssh key length: ${#HOSTINGER_SSH_KEY} bytes"
          echo "host: $HOSTINGER_SSH_HOST   user: $HOSTINGER_SSH_USER"

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HOSTINGER_SSH_KEY }}

      - name: Trust VPS host key
        env:
          HOSTINGER_SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          HOSTINGER_SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
        run: |
          set -eu
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          port="${HOSTINGER_SSH_PORT:-22}"
          # reject non-numeric ports up front (common secret mix-up)
          if ! [[ "$port" =~ ^[0-9]+$ ]]; then
            echo "HOSTINGER_SSH_PORT is not a number (got length ${#port} — check the secret value)"
            exit 1
          fi
          echo "scanning $HOSTINGER_SSH_HOST:$port ..."
          # keep stderr visible so network errors are diagnosable
          if ! ssh-keyscan -T 10 -p "$port" -H "$HOSTINGER_SSH_HOST" >> ~/.ssh/known_hosts; then
            echo "ssh-keyscan failed — the VPS is unreachable on port $port from GitHub's runners."
            echo "Check: (1) host value, (2) port value, (3) firewall rules on the VPS / Hostinger panel."
            exit 1
          fi
          if ! [[ -s ~/.ssh/known_hosts ]]; then
            echo "ssh-keyscan produced no output — VPS did not respond on port $port"
            exit 1
          fi
          echo "host key pinned ($(wc -l < ~/.ssh/known_hosts) entries)"

      - name: Sync compose file + deploy script to VPS
        env:
          HOSTINGER_SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          HOSTINGER_SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          HOSTINGER_SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          DEPLOY_DIR: ${{ secrets.HOSTINGER_DEPLOY_DIR }}
        run: |
          set -eu
          port="${HOSTINGER_SSH_PORT:-22}"
          deploy_dir="${DEPLOY_DIR:-/opt/tradecore}"
          ssh -p "$port" "$HOSTINGER_SSH_USER@$HOSTINGER_SSH_HOST" \
            "mkdir -p $deploy_dir/deploy/nginx"
          scp -P "$port" \
            docker-compose.prod.yml \
            scripts/deploy-remote.sh \
            "$HOSTINGER_SSH_USER@$HOSTINGER_SSH_HOST:$deploy_dir/"
          scp -P "$port" \
            deploy/nginx/prod.conf \
            "$HOSTINGER_SSH_USER@$HOSTINGER_SSH_HOST:$deploy_dir/deploy/nginx/"
          ssh -p "$port" "$HOSTINGER_SSH_USER@$HOSTINGER_SSH_HOST" \
            "chmod +x $deploy_dir/deploy-remote.sh"

      - name: Run selective deploy on VPS
        env:
          HOSTINGER_SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          HOSTINGER_SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          HOSTINGER_SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          DEPLOY_DIR: ${{ secrets.HOSTINGER_DEPLOY_DIR }}
          SERVICES: ${{ steps.scope.outputs.services }}
          SHA: ${{ github.sha }}
        run: |
          set -eu
          port="${HOSTINGER_SSH_PORT:-22}"
          deploy_dir="${DEPLOY_DIR:-/opt/tradecore}"
          ssh -p "$port" "$HOSTINGER_SSH_USER@$HOSTINGER_SSH_HOST" \
            "cd $deploy_dir && DEPLOY_DIR=$deploy_dir ./deploy-remote.sh $SHA $SHA $SERVICES"

      - name: Health probe
        env:
          HEALTH_URL: ${{ secrets.HOSTINGER_HEALTH_URL }}
        run: |
          set -eu
          url="${HEALTH_URL:-}"
          if [[ -z "$url" ]]; then
            echo "HOSTINGER_HEALTH_URL not set — skipping post-deploy probe"
            exit 0
          fi
          for i in 1 2 3 4 5 6; do
            if curl -fsS "$url" >/dev/null; then
              echo "health check ok ($url)"
              exit 0
            fi
            echo "attempt $i failed, retrying..."
            sleep 5
          done
          echo "health check FAILED after 6 attempts"
          exit 1
